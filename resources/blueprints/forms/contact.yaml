sections:
  main:
    display: Main
    fields:
      -
        handle: name
        field:
          display: Name
          type: text
          validate: required
          localizable: true
      -
        handle: email
        field:
          display: 'E-mail address'
          type: text
          validate: required|email
          localizable: true
      -
        handle: phone
        field:
          input_type: text
          antlers: false
          display: Phone
          type: text
          icon: text
          listable: hidden
          validate:
            - required
      -
        handle: project_address
        field:
          input_type: text
          antlers: false
          display: 'Project Address'
          type: text
          icon: text
          listable: hidden
          validate:
            - required
      -
        handle: message_body
        field:
          display: 'Project Description'
          type: textarea
          validate: required
          localizable: true
          listable: hidden
          antlers: false
      -
        handle: fax
        field:
          input_type: text
          antlers: false
          display: Fax
          type: text
          icon: text
          listable: hidden
      -
        handle: turnstile
        field:
          theme: auto
          display: Turnstile
          type: turnstile
          icon: lock
          listable: hidden
