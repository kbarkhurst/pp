{{# The form code stays exactly the same as before, just swap the script block
at the bottom with this #}}
<script>
function sending() {
    return {
        sending: false,
        success: false,
        error: false,
        // SAFE FALLBACK: This stops Alpine from crashing when it loops over errors.handle
        errors: {}, 
        sendForm() {
            // If the script is already running a submission task, drop out to prevent duplicate clicks
            if (this.sending) return;

            // FRONTEND TRAP: Stop automated headless spam bots right here
            const honeypotSnatched = document.getElementById('fax')?.value;
            if (honeypotSnatched && honeypotSnatched.trim() !== "") {
                console.warn("Spam bot detected by honeypot input.");
                this.success = true;
                this.sending = false;
                this.$refs.form.reset();
                return;
            }

            this.sending = true;
            this.errors = {}; // Reset error messages on new submit
            
            fetch(this.$refs.form.action, {
                headers: {
                    'X-Requested-With' : 'XMLHttpRequest',
                    'Accept': 'application/json'
                },
                method: 'POST',
                body: new FormData(this.$refs.form)
            })
            .then(res => {
                if (!res.ok) {
                    this.sending = false;
                    this.error = true;
                    this.success = false;
                    alert('Form submission rejected. Please ensure all fields are filled out correctly.');
                    return null;
                }
                return res.json();
            })
            .then(json => {
                if (!json) return;

                if (json.success) {
                    this.errors = {};
                    this.success = true;
                    this.error = false;
                    this.sending = false;
                    this.$refs.form.reset();
                } else if (json.error) {
                    this.sending = false;
                    this.error = true;
                    this.success = false;
                    this.errors = json.error;
                }
            })
            .catch(err => {
                this.sending = false;
                console.error('Network failure:', err);
            });
        }
    }
}
</script>
